<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Radar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f4f5f7; color: #172b4d; min-height: 100vh; }

    header { background: #0c1e3c; color: #fff; padding: .75rem 1.5rem; position: sticky; top: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,.25); }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.02em; }
    header .tagline { font-size: .75rem; color: rgba(255,255,255,.5); margin-left: .5rem; font-weight: 400; }

    .toolbar { position: sticky; top: 44px; z-index: 150; display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; padding: .75rem 1.5rem; background: #fff; border-bottom: 1px solid #dfe1e6; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .toolbar label { font-size: .7rem; font-weight: 600; color: #6b778c; text-transform: uppercase; letter-spacing: .04em; display: flex; flex-direction: column; gap: .2rem; }
    .toolbar input[type=range] { width: 110px; height: 4px; accent-color: #0052cc; cursor: pointer; }
    .toolbar select, .toolbar input[type=text] { padding: .35rem .55rem; border: 1px solid #dfe1e6; border-radius: 4px; font-size: .8rem; background: #fafbfc; transition: border-color .15s; }
    .toolbar select:focus, .toolbar input[type=text]:focus { outline: none; border-color: #0052cc; box-shadow: 0 0 0 2px rgba(0,82,204,.15); }
    .toolbar input[type=text] { width: 200px; }

    .btn { padding: .4rem .85rem; border: none; border-radius: 4px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: background .15s, transform .1s; line-height: 1.4; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #0052cc; color: #fff; }
    .btn-primary:hover { background: #0043b3; }
    .btn-primary:disabled { background: #a5adba; cursor: not-allowed; }
    .btn-success { background: #00875a; color: #fff; }
    .btn-success:hover { background: #006644; }
    .btn-success:disabled { background: #a5adba; cursor: default; }
    .btn-apply { background: #0052cc; color: #fff; text-decoration: none; display: inline-flex; align-items: center; padding: .35rem .75rem; border-radius: 4px; font-size: .78rem; font-weight: 600; transition: background .15s; }
    .btn-apply:hover { background: #0043b3; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: .35rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status { font-size: .78rem; color: #6b778c; align-self: center; margin-left: auto; white-space: nowrap; }
    .status:empty { display: none; }

    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; padding: 1.25rem 1.5rem; max-width: 1400px; margin: 0 auto; }

    .card { background: #fff; border-radius: 8px; padding: 1.1rem 1.25rem; border: 1px solid #dfe1e6; transition: box-shadow .2s, opacity .3s, border-color .2s; display: flex; flex-direction: column; gap: .5rem; }
    .card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #c1c7d0; }
    .card.applied { opacity: .4; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
    .card-title { font-size: .92rem; font-weight: 600; line-height: 1.35; color: #172b4d; }
    .card-company { font-size: .82rem; color: #6b778c; font-weight: 500; }
    .card-meta { display: flex; gap: .6rem; font-size: .75rem; color: #97a0af; flex-wrap: wrap; align-items: center; }
    .card-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: #dfe1e6; flex-shrink: 0; }

    .badge { display: inline-flex; align-items: center; padding: .12rem .5rem; border-radius: 3px; font-size: .72rem; font-weight: 700; letter-spacing: .02em; white-space: nowrap; flex-shrink: 0; }
    .badge-high { background: #e3fcef; color: #006644; }
    .badge-mid  { background: #fffae6; color: #ff8b00; }
    .badge-low  { background: #f4f5f7; color: #6b778c; }

    .card-actions { display: flex; gap: .4rem; margin-top: auto; padding-top: .6rem; border-top: 1px solid #f0f1f4; }

    .card-skills { overflow: hidden; max-height: 0; transition: max-height .25s ease; }
    .card-skills.open { max-height: 200px; }
    .skills-toggle { font-size: .7rem; color: #0052cc; cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: .25rem; margin-top: .1rem; }
    .skills-toggle:hover { text-decoration: underline; }
    .skills-toggle .arrow { transition: transform .2s; font-size: .6rem; }
    .skills-toggle.open .arrow { transform: rotate(90deg); }
    .skill-tag { display: inline-block; padding: .1rem .45rem; background: #e9ecef; color: #495057; border-radius: 3px; font-size: .68rem; font-weight: 500; }
    .card-skills .card-skills-inner { display: flex; flex-wrap: wrap; gap: .3rem; padding-top: .3rem; }

    .empty { grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: #97a0af; font-size: .95rem; }

    /* ── shimmer skeleton ── */
    .skeleton { background: #e9ecef; border-radius: 8px; padding: 1.1rem 1.25rem; border: 1px solid #dfe1e6; display: flex; flex-direction: column; gap: .6rem; }
    .shimmer { background: linear-gradient(90deg, #e9ecef 25%, #f0f1f4 50%, #e9ecef 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sh-title { height: 16px; width: 70%; }
    .sh-company { height: 12px; width: 40%; }
    .sh-meta { height: 10px; width: 55%; }
    .sh-actions { height: 28px; width: 50%; margin-top: .5rem; border-top: 1px solid #f0f1f4; padding-top: .5rem; }

    /* ── pagination ── */
    .pagination { display: flex; justify-content: center; align-items: center; gap: .4rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; }
    .page-btn { padding: .35rem .65rem; border: 1px solid #dfe1e6; border-radius: 4px; background: #fff; font-size: .78rem; font-weight: 500; cursor: pointer; transition: all .15s; color: #172b4d; min-width: 32px; text-align: center; }
    .page-btn:hover:not(:disabled):not(.active) { background: #f0f1f4; border-color: #c1c7d0; }
    .page-btn.active { background: #0052cc; color: #fff; border-color: #0052cc; }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }
    .page-info { font-size: .78rem; color: #6b778c; margin: 0 .5rem; }

    @media (max-width: 768px) {
      header { padding: .6rem 1rem; }
      header h1 { font-size: 1rem; }
      header .tagline { display: none; }
      .toolbar { top: 40px; padding: .6rem 1rem; gap: .5rem; }
      .toolbar input[type=text] { width: 100%; }
      .toolbar label { flex: 1 1 120px; min-width: 0; }
      .toolbar input[type=range] { width: 100%; }
      .cards { grid-template-columns: 1fr; padding: 1rem; gap: .75rem; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .cards { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Job Radar<span class="tagline">matching jobs, scored for you</span></h1>
  </header>

  <div class="toolbar">
    <label>
      Min Score: <span id="scoreVal">0.00</span>
      <input type="range" id="scoreSlider" min="0" max="1" step="0.05" value="0">
    </label>
    <label>
      Source
      <select id="sourceSelect"><option value="">All</option></select>
    </label>
    <label>
      Search
      <input type="text" id="searchInput" placeholder="title, company...">
    </label>
    <label>
      Skills
      <input type="text" id="skillsInput" placeholder="e.g. React, Python">
    </label>
    <label>
      Fresh
      <select id="freshSelect">
        <option value="">All time</option>
        <option value="1">Last 24h</option>
        <option value="3">Last 3 days</option>
        <option value="7" selected>Last 7 days</option>
        <option value="14">Last 14 days</option>
        <option value="30">Last 30 days</option>
      </select>
    </label>
    <button class="btn btn-primary" id="refreshBtn">Refresh Jobs</button>
    <span class="status" id="status"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div class="pagination" id="pagination"></div>

  <script>
    const $ = s => document.querySelector(s);
    const cards = $('#cards');
    const pagination = $('#pagination');
    const scoreSlider = $('#scoreSlider');
    const scoreVal = $('#scoreVal');
    const sourceSelect = $('#sourceSelect');
    const searchInput = $('#searchInput');
    const skillsInput = $('#skillsInput');
    const freshSelect = $('#freshSelect');
    const refreshBtn = $('#refreshBtn');
    const status = $('#status');

    let debounceTimer;
    let currentPage = 1;
    const PER_PAGE = 20;

    function badgeClass(score) {
      if (score >= 0.6) return 'badge-high';
      if (score >= 0.3) return 'badge-mid';
      return 'badge-low';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const ts = new Date(dateStr).getTime();
      if (isNaN(ts) || ts < 946684800000) return ''; // before year 2000 = bad date
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days > 30) return new Date(dateStr).toLocaleDateString();
      return days + 'd ago';
    }

    function renderCard(job) {
      const applied = !!job.appliedAt;
      let skills = [];
      try { skills = JSON.parse(job.skillsTags || '[]'); } catch {}
      const uid = job.id.slice(0, 8);
      const skillSection = skills.length
        ? `<span class="skills-toggle" onclick="toggleSkills('${uid}',this)"><span class="arrow">&#9654;</span> ${skills.length} skill${skills.length > 1 ? 's' : ''}</span>
           <div class="card-skills" id="skills-${uid}"><div class="card-skills-inner">${skills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('')}</div></div>`
        : '';
      const posted = timeAgo(job.postedDate || job.seenAt);
      return `
        <div class="card${applied ? ' applied' : ''}" data-id="${job.id}">
          <div class="card-header">
            <span class="card-title">${esc(job.title)}</span>
            <span class="badge ${badgeClass(job.score)}">${job.score.toFixed(2)}</span>
          </div>
          <div class="card-company">${esc(job.company)}</div>
          <div class="card-meta">
            <span>${esc(job.location || 'Remote')}</span>
            <span class="sep"></span>
            <span>${esc(job.source)}</span>
            ${posted ? `<span class="sep"></span><span>${posted}</span>` : ''}
          </div>
          ${skillSection}
          <div class="card-actions">
            <a class="btn-apply" href="${esc(job.url)}" target="_blank" rel="noopener">Apply</a>
            ${applied
              ? '<button class="btn btn-success" disabled>Applied</button>'
              : `<button class="btn btn-success" onclick="markApplied('${job.id}')">Mark Applied</button>`
            }
          </div>
        </div>`;
    }

    function renderSkeletons(count) {
      return Array(count).fill('').map(() => `
        <div class="skeleton">
          <div class="shimmer sh-title"></div>
          <div class="shimmer sh-company"></div>
          <div class="shimmer sh-meta"></div>
          <div class="sh-actions"><div class="shimmer" style="height:100%;width:40%;border-radius:4px"></div></div>
        </div>`).join('');
    }

    function renderPagination(page, pages) {
      if (pages <= 1) { pagination.innerHTML = ''; return; }

      let html = `<button class="page-btn" ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">&laquo;</button>`;

      const range = [];
      const delta = 2;
      for (let i = Math.max(1, page - delta); i <= Math.min(pages, page + delta); i++) range.push(i);
      if (range[0] > 1) { range.unshift(1); if (range[1] > 2) range.splice(1, 0, '...'); }
      if (range[range.length - 1] < pages) {
        if (range[range.length - 1] < pages - 1) range.push('...');
        range.push(pages);
      }

      for (const p of range) {
        if (p === '...') html += `<span class="page-info">...</span>`;
        else html += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
      }

      html += `<button class="page-btn" ${page >= pages ? 'disabled' : ''} onclick="goPage(${page + 1})">&raquo;</button>`;
      pagination.innerHTML = html;
    }

    window.goPage = function(p) { currentPage = p; loadJobs(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

    window.toggleSkills = function(uid, el) {
      const box = document.getElementById('skills-' + uid);
      box.classList.toggle('open');
      el.classList.toggle('open');
    };

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function loadJobs() {
      cards.innerHTML = renderSkeletons(PER_PAGE);
      pagination.innerHTML = '';

      const params = new URLSearchParams();
      const minScore = parseFloat(scoreSlider.value);
      if (minScore > 0) params.set('minScore', minScore);
      if (sourceSelect.value) params.set('source', sourceSelect.value);
      if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
      if (skillsInput.value.trim()) params.set('skills', skillsInput.value.trim());
      if (freshSelect.value) params.set('days', freshSelect.value);
      params.set('page', currentPage);
      params.set('limit', PER_PAGE);

      const res = await fetch('/api/jobs?' + params);
      const data = await res.json();

      cards.innerHTML = data.jobs.length
        ? data.jobs.map(renderCard).join('')
        : '<div class="empty">No jobs match your filters.</div>';

      renderPagination(data.page, data.pages);
      status.textContent = data.total > 0 ? `${data.total} jobs total` : '';
    }

    function resetPage() { currentPage = 1; }

    async function loadSources() {
      const res = await fetch('/api/sources');
      const sources = await res.json();
      const current = sourceSelect.value;
      sourceSelect.innerHTML = '<option value="">All</option>';
      for (const s of sources) {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        sourceSelect.appendChild(opt);
      }
      sourceSelect.value = current;
    }

    window.markApplied = async function(id) {
      const card = document.querySelector(`.card[data-id="${id}"]`);
      const btn = card.querySelector('.btn-success');
      btn.disabled = true;
      btn.textContent = '...';
      const res = await fetch(`/api/jobs/${id}/applied`, { method: 'POST' });
      if (res.ok) { card.classList.add('applied'); btn.textContent = 'Applied'; }
      else { btn.disabled = false; btn.textContent = 'Mark Applied'; }
    };

    refreshBtn.addEventListener('click', async () => {
      refreshBtn.disabled = true;
      refreshBtn.innerHTML = '<span class="spinner"></span>Refreshing...';
      status.textContent = 'Fetching new jobs...';
      try {
        const res = await fetch('/api/refresh', { method: 'POST' });
        const data = await res.json();
        status.textContent = `Done — ${data.added} new job${data.added !== 1 ? 's' : ''} found.`;
        resetPage(); await loadJobs();
      } catch (err) { status.textContent = 'Refresh failed: ' + err.message; }
      finally { refreshBtn.disabled = false; refreshBtn.textContent = 'Refresh Jobs'; }
    });

    scoreSlider.addEventListener('input', () => {
      scoreVal.textContent = parseFloat(scoreSlider.value).toFixed(2);
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { resetPage(); loadJobs(); }, 300);
    });

    sourceSelect.addEventListener('change', () => { resetPage(); loadJobs(); });

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { resetPage(); loadJobs(); }, 300);
    });

    skillsInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { resetPage(); loadJobs(); }, 300);
    });

    freshSelect.addEventListener('change', () => { resetPage(); loadJobs(); });

    loadSources();
    loadJobs();
  </script>
</body>
</html>
